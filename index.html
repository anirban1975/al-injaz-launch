<style>
:root{color-scheme:light;--navy:#0B3D5C;--navy2:#0e3149;--teal:#1B9AAA;--gold:#C8961E;--green:#2E7D52;--ink:#13262F;--grey:#5A6B73;--line:#E4EAEE;--bg:#F4F8F9;--card:#fff}
*{box-sizing:border-box}html,body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Calibri,Arial,sans-serif;color:var(--ink);background:#fff}
.nav{position:sticky;top:0;z-index:30;background:rgba(11,61,92,.97);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 22px;backdrop-filter:blur(6px)}
.nav .b{font-family:Georgia,serif;font-weight:700;font-size:17px}
.nav .b small{display:block;font-size:10px;letter-spacing:2px;color:#8FCAD2;font-weight:700;text-transform:uppercase}
.nav .r{display:flex;gap:8px;align-items:center}
.btn{background:var(--teal);color:#fff;border:0;border-radius:9px;padding:10px 16px;font:inherit;font-weight:600;font-size:14px;cursor:pointer;text-decoration:none;display:inline-block}
.btn:hover{background:#157e8c}.btn.ghost{background:transparent;border:1px solid #4f7e95;color:#fff}.btn.gold{background:var(--gold)}.btn.gold:hover{background:#a87c16}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}
.hero{background:linear-gradient(135deg,var(--navy),#12506f);color:#fff;padding:64px 0 70px;position:relative;overflow:hidden}
.hero .badge{display:inline-block;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:6px 14px;font-size:12.5px;font-weight:600;margin-bottom:18px}
.hero h1{font-family:Georgia,serif;font-size:42px;line-height:1.12;margin:0 0 14px;max-width:760px}
.hero p{font-size:18px;color:#DCEAEE;max-width:660px;line-height:1.5;margin:0 0 24px}
.hero .ctas{display:flex;gap:12px;flex-wrap:wrap}
.chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px}
.chip{background:rgba(255,255,255,.1);border-radius:12px;padding:9px 14px;font-size:13px}
.chip b{font-family:Georgia,serif;font-size:18px;display:block}
.blob{position:absolute;border-radius:50%;opacity:.16}
.sec{padding:54px 0}.sec.alt{background:var(--bg)}
.kick{color:var(--teal);font-weight:700;letter-spacing:2px;text-transform:uppercase;font-size:12.5px;margin:0 0 8px}
.sec h2{font-family:Georgia,serif;font-size:30px;color:var(--navy);margin:0 0 10px}
.sec .lead{color:var(--grey);font-size:16px;max-width:680px;margin:0 0 26px;line-height:1.5}
.grid{display:grid;gap:16px}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:860px){.g3,.g2,.g4{grid-template-columns:1fr}.hero h1{font-size:32px}}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card .ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;margin-bottom:10px}
.card h3{margin:0 0 6px;color:var(--navy);font-size:17px}.card p{margin:0;color:var(--grey);font-size:13.5px;line-height:1.5}
.exp{display:grid;grid-template-columns:1fr 1.05fr;gap:24px;align-items:start}@media(max-width:860px){.exp{grid-template-columns:1fr}}
.chatcard{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.10)}
.chathead{background:var(--navy);color:#fff;padding:13px 16px}.chathead .t{font-weight:700;font-family:Georgia,serif}.chathead .s{font-size:11px;color:#9FD3DA;display:flex;align-items:center;gap:6px;margin-top:2px}.dot{width:8px;height:8px;border-radius:50%;background:#46d39a;display:inline-block}
.cbody{height:300px;overflow:auto;padding:14px;background:var(--bg);display:flex;flex-direction:column;gap:9px}
.msg{max-width:86%;padding:9px 12px;border-radius:13px;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
.msg.bot{background:#fff;border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px}
.msg.me{background:var(--teal);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.quick{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;background:#fff;border-top:1px solid var(--line)}
.quick button{font-size:12px;border:1px solid var(--line);background:var(--bg);border-radius:14px;padding:5px 11px;cursor:pointer;color:var(--navy)}
.cin{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line)}.cin input{flex:1;font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:8px}
.pill{display:inline-block;background:#E7F2F3;color:#127;border-radius:11px;padding:3px 10px;font-size:12px;font-weight:600;margin:3px 5px 3px 0;color:var(--navy)}
.foot{background:var(--navy);color:#fff;padding:40px 0}
.foot a{color:#9FD3DA}.foot .pos{font-family:Georgia,serif;font-size:20px;max-width:640px;line-height:1.5;margin:0 0 18px}
.facwrap{display:flex;flex-wrap:wrap;gap:8px}
[dir=rtl] .hero h1,[dir=rtl] .hero p{margin-left:auto}
[dir=rtl] .msg.bot{align-self:flex-end}[dir=rtl] .msg.me{align-self:flex-start}
[dir=rtl] body{text-align:right}

.vid{position:relative;width:100%;padding-top:56.25%;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#000}
.vid iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.voices-grid{display:grid;grid-template-columns:1.5fr .9fr;gap:18px;align-items:start}
@media(max-width:860px){.voices-grid{grid-template-columns:1fr}}
.sociallinks{display:flex;flex-direction:column;gap:10px}
.sociallinks a{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 14px;text-decoration:none;color:var(--navy);font-weight:600;font-size:14px}
.sociallinks a:hover{background:#e9f3f4}
.tcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tcard .ts{font-size:10.5px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.tcard .q{font-size:14.5px;color:var(--ink);line-height:1.5}
.tcard .w{font-size:12.5px;color:var(--grey);margin-top:8px;font-weight:600}
</style>
</head>

function toggleLang(){lang=(lang==='ar'?'en':'ar');localStorage.setItem('aiinjaz_launch_lang',lang);render();}

function ans(topic,free){const F=FAQ[lang];if(topic&&F[topic])return F[topic];const x=(free||'').toLowerCase();
 if(/fee|cost|price|رسوم|تكلف/.test(x))return F.fees;
 if(/admiss|enrol|join|قبول|تسجيل|التحاق/.test(x))return F.admissions;
 if(/tour|visit|زيار/.test(x))return F.tour;
 if(/special|need|inclus|احتياج|دمج|توحد/.test(x))return F.sen;
 if(/bus|transport|نقل|حافل/.test(x))return F.transport;
 return F.def;}
function cq(k){addMsg('me',D[lang].q[k]);const t=el('cBody');const typing=addMsg('bot','…');setTimeout(()=>{typing.textContent=ans(QTOPIC[k],null);},350);}
function csend(){const i=el('cInput');const v=i.value.trim();if(!v)return;i.value='';addMsg('me',v);const typing=addMsg('bot','…');setTimeout(()=>{typing.textContent=ans(null,v);},350);}
