<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Al Injaz Marketing Command</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light;--navy:#0B3D5C;--navy2:#0e3149;--teal:#1B9AAA;--gold:#C8961E;--green:#2E7D52;--red:#B33A3A;--ink:#13262F;--grey:#5A6B73;--line:#E4EAEE;--bg:#F1F5F7;--card:#FFFFFF;}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Calibri,Arial,sans-serif;background:var(--bg);color:var(--ink)}
a{color:inherit}
.app{display:flex;min-height:100vh}
/* sidebar */
.side{width:228px;background:var(--navy);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:18px 18px 12px;border-bottom:1px solid #14496a}
.brand .k{font-size:10.5px;letter-spacing:2px;color:#8FCAD2;font-weight:700;text-transform:uppercase}
.brand h1{font-family:Georgia,serif;font-size:18px;margin:4px 0 0;font-weight:700;line-height:1.2}
.nav{padding:10px 10px;flex:1;overflow:auto}
.nav button{width:100%;text-align:left;background:none;border:0;color:#CFE3E8;font:inherit;font-size:14px;padding:10px 12px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:10px;margin:2px 0}
.nav button .ic{width:18px;text-align:center}
.nav button:hover{background:#114866}
.nav button.active{background:var(--teal);color:#fff;font-weight:600}
.sidefoot{padding:14px 16px;border-top:1px solid #14496a}
.sidefoot .ts{display:flex;align-items:center;gap:12px}
.sidefoot .num{font-family:Georgia,serif;font-size:26px;font-weight:700}
.sidefoot .lab{font-size:10px;color:#8FCAD2;text-transform:uppercase;letter-spacing:1px}
/* main */
.main{flex:1;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:16px 26px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20}
.topbar h2{margin:0;font-family:Georgia,serif;font-size:21px;color:var(--navy)}
.topbar .sub{font-size:13px;color:var(--grey);margin-top:2px}
.content{padding:24px 26px 70px;max-width:1120px}
.view{display:none}.view.active{display:block}
/* generic */
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.row{display:grid;gap:16px}
.r2{grid-template-columns:1.1fr .9fr}.r3{grid-template-columns:repeat(3,1fr)}.r4{grid-template-columns:repeat(4,1fr)}
@media(max-width:880px){.r2,.r3,.r4{grid-template-columns:1fr}}
.section-title{font-family:Georgia,serif;font-size:17px;color:var(--navy);margin:26px 0 12px;font-weight:700}
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat .v{font-family:Georgia,serif;font-size:30px;font-weight:700;line-height:1}
.stat .l{font-size:12px;color:var(--grey);margin-top:5px}
.chartbox{position:relative;height:300px}
.ring{display:flex;align-items:center;gap:12px}
.ring svg{transform:rotate(-90deg)}
/* agent cards */
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:880px){.cards{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:transform .12s,box-shadow .12s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.10)}
.card .bar{height:6px}.card .body{padding:15px 17px}
.card h4{margin:0;font-size:16px;color:var(--navy);font-family:Georgia,serif}
.card .role{font-size:11.5px;color:var(--grey);margin-top:2px}
.head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.perf{text-align:right;flex-shrink:0}.perf .pv{font-family:Georgia,serif;font-size:22px;font-weight:700;line-height:1}.perf .pl{font-size:9.5px;color:var(--grey);text-transform:uppercase}
.headline{font-size:12.5px;margin:11px 0 9px;line-height:1.45;color:var(--ink)}
.statusdot{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:12px}
.s-on{background:#E7F4EC;color:#1f7a4d}.s-att{background:#FBF1D6;color:#9a6b08}.s-blk{background:#FBECEC;color:#b3392f}
.mini{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}.tag{font-size:10.5px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px 8px;color:var(--grey)}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(10,30,40,.55);display:none;align-items:flex-start;justify-content:center;padding:28px 16px;z-index:60;overflow:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:780px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.mhead{padding:20px 24px;color:#fff}.mhead h3{margin:0;font-family:Georgia,serif;font-size:22px}.mhead p{margin:4px 0 0;font-size:13px;opacity:.92}
.closex{float:right;cursor:pointer;font-size:24px;color:#fff;opacity:.85;line-height:1}
.mbody{padding:18px 24px;max-height:66vh;overflow:auto}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 13px;font-size:13px;font-weight:600;color:var(--grey);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--navy);border-bottom-color:var(--teal)}
.tabpane{display:none}.tabpane.active{display:block}
.mbody h5{margin:14px 0 6px;color:var(--teal);font-size:11.5px;text-transform:uppercase;letter-spacing:1px}
.mbody ul{margin:0 0 8px;padding-left:18px}.mbody li{margin:5px 0;font-size:13.5px;line-height:1.45}
.kpi{margin:12px 0}.kpi .kl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}.kpi .kl b{color:var(--navy)}.kpi .kl .tg{color:var(--grey);font-size:12px}
.kpi input[type=range]{width:100%}.kbar{height:8px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:3px}.kbar i{display:block;height:100%;border-radius:6px}.kval{font-size:12px;color:var(--grey);margin-top:2px}
.field{margin:10px 0}.field label{font-size:12px;font-weight:600;color:var(--navy);display:block;margin-bottom:5px}
select,textarea,input[type=text]{width:100%;font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
textarea{min-height:60px;resize:vertical}
.btn{background:var(--teal);color:#fff;border:0;border-radius:8px;padding:9px 15px;font-weight:600;cursor:pointer;font-size:13px}
.btn:hover{background:#157e8c}.btn.alt{background:var(--navy)}.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--navy)}
.sugg{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-top:8px;font-size:13px}.sugg .when{font-size:11px;color:var(--grey);margin-bottom:2px}
.aibox{background:#F3FAFB;border:1px solid #CDE8EC;border-radius:10px;padding:12px;margin-top:8px;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
.muted{color:var(--grey);font-size:13px}
/* tasks */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}@media(max-width:880px){.kanban{grid-template-columns:1fr}}
.col{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;min-height:120px}
.col h4{margin:0 0 10px;font-size:13px;color:var(--navy);text-transform:uppercase;letter-spacing:.5px}
.task{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:9px;font-size:13px}
.task .meta{font-size:11px;color:var(--grey);margin-top:6px;display:flex;justify-content:space-between;align-items:center}
.task .ag{font-weight:600}
.task .acts button{font-size:11px;border:0;background:#fff;border:1px solid var(--line);border-radius:6px;padding:2px 7px;cursor:pointer;margin-left:4px}
.addtask{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.addtask input{flex:1;min-width:180px}.addtask select{max-width:200px}
/* facilities */
.fcat{margin-bottom:8px}
.facs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}@media(max-width:880px){.facs{grid-template-columns:1fr 1fr}}@media(max-width:560px){.facs{grid-template-columns:1fr}}
.fac{background:#fff;border:1px solid var(--line);border-radius:11px;padding:13px 14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.fac .fi{font-size:20px}.fac h5{margin:6px 0 3px;font-size:14px;color:var(--navy)}.fac p{margin:0;font-size:12px;color:var(--grey);line-height:1.4}
.pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:11px;background:#E7F4EC;color:#1f7a4d;margin:2px 4px 2px 0}
/* timeline */
.tl{border-left:2px solid var(--line);margin-left:8px;padding-left:16px}
.tlitem{margin-bottom:14px;position:relative}.tlitem:before{content:"";position:absolute;left:-22px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--teal)}
.tlitem .when{font-size:11px;color:var(--grey)}.tlitem .txt{font-size:13.5px;margin-top:2px}
.report{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:12px;white-space:pre-wrap;font-size:13.5px;line-height:1.55}
.banner{background:linear-gradient(100deg,var(--navy),#12506f);color:#fff;border-radius:14px;padding:18px 22px;margin-bottom:18px}
.banner b{color:#fff}.banner .pos{font-size:15px;line-height:1.5}
.goals{margin-top:10px}.goals .g{display:inline-block;background:rgba(255,255,255,.14);border-radius:20px;padding:5px 13px;font-size:13px;font-weight:600;margin:4px 6px 0 0}
.empty{color:var(--grey);font-size:13px;padding:8px 0}

[dir=rtl] .nav button{text-align:right}
[dir=rtl] .topbar,[dir=rtl] .addtask,[dir=rtl] .field{direction:rtl}
[dir=rtl] .kl{direction:rtl}
#chatFab{position:fixed;bottom:20px;right:20px;z-index:80;background:var(--teal);color:#fff;border:0;border-radius:30px;padding:13px 18px;font:inherit;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.25)}
#chatFab:hover{background:#157e8c}
[dir=rtl] #chatFab{right:auto;left:20px}
#chatPanel{position:fixed;bottom:84px;right:20px;width:362px;max-width:calc(100vw - 36px);height:530px;max-height:calc(100vh - 120px);background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);z-index:80;display:none;flex-direction:column;overflow:hidden}
[dir=rtl] #chatPanel{right:auto;left:20px}
#chatPanel.open{display:flex}
.chathead{background:var(--navy);color:#fff;padding:13px 16px}
.chathead .t{font-weight:700;font-family:Georgia,serif;font-size:16px}
.chathead .s{font-size:11px;color:#9FD3DA;display:flex;align-items:center;gap:6px;margin-top:2px}
.chathead .dot{width:8px;height:8px;border-radius:50%;background:#46d39a;display:inline-block}
.chathead .x{float:right;cursor:pointer;font-size:22px;opacity:.85;line-height:1}
[dir=rtl] .chathead .x{float:left}
.chatbody{flex:1;overflow:auto;padding:14px;background:var(--bg);display:flex;flex-direction:column;gap:9px}
.msg{max-width:86%;padding:9px 12px;border-radius:13px;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
.msg.bot{background:#fff;border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px}
.msg.me{background:var(--teal);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
[dir=rtl] .msg.bot{align-self:flex-end}
[dir=rtl] .msg.me{align-self:flex-start}
.quick{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;background:#fff;border-top:1px solid var(--line)}
.quick button{font-size:12px;border:1px solid var(--line);background:var(--bg);border-radius:14px;padding:5px 11px;cursor:pointer;color:var(--navy)}
.quick button:hover{background:#e9f3f4}
.chatin{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:#fff}
.chatin input{flex:1}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="k">Al Injaz International</div><h1>Marketing Command</h1></div>
    <nav class="nav" id="nav"></nav>
    <div class="sidefoot"><div class="ts">
      <svg width="54" height="54" viewBox="0 0 54 54"><circle cx="27" cy="27" r="22" fill="none" stroke="#1c4a64" stroke-width="7"/><circle id="ringArc" cx="27" cy="27" r="22" fill="none" stroke="#1B9AAA" stroke-width="7" stroke-linecap="round" stroke-dasharray="138" stroke-dashoffset="138"/></svg>
      <div><div class="num" id="teamScore">0</div><div class="lab">Team performance</div></div>
    </div></div>
  </aside>
  <main class="main">
    <div class="topbar"><div><h2 id="vTitle">Overview</h2><div class="sub" id="vSub"></div></div>
      <div style="display:flex;gap:8px"><button class="btn ghost" id="langBtn" onclick="toggleLang()">العربية</button><button class="btn ghost" id="resetBtn" onclick="resetData()">Reset data</button></div></div>
    <div class="content">
      <section class="view active" id="v-overview"></section>
      <section class="view" id="v-agents"></section>
      <section class="view" id="v-tasks"></section>
      <section class="view" id="v-strategy"></section>
      <section class="view" id="v-facilities"></section>
      <section class="view" id="v-reports"></section>
      <section class="view" id="v-activity"></section>
    </div>
  </main>
</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<button id="chatFab" onclick="chatToggle()"><span id="chatFabT">💬 Helpline</span></button>
<div id="chatPanel">
  <div class="chathead"><span class="x" onclick="chatToggle()">×</span><div class="t" id="chatTitle">Al Injaz Helpline</div><div class="s"><span class="dot"></span><span id="chatSub">24/7 · we usually reply instantly</span></div></div>
  <div class="chatbody" id="chatBody"></div>
  <div class="quick" id="chatQuick"></div>
  <div class="chatin"><input type="text" id="chatInput" placeholder="Type your question…" onkeydown="if(event.key==='Enter')chatSendInput()"><button class="btn" id="chatSendBtn" onclick="chatSendInput()">Send</button></div>
</div>

<script>
const C={navy:"#0B3D5C",teal:"#1B9AAA",gold:"#C8961E",green:"#2E7D52",red:"#B33A3A",grey:"#5A6B73"};
const AI=(window.cowork&&typeof window.cowork.askClaude==="function")?window.cowork.askClaude.bind(window.cowork):null;
async function askAI(prompt){
  if(!AI) return "[Live AI responses run when this app is open inside Cowork. Here is a structured prompt the agent would answer:]\n\n"+prompt;
  try{const r=await AI(prompt,[]);
    if(typeof r==="string")return r;
    if(r&&r.text)return r.text;
    if(r&&r.content&&r.content[0]&&r.content[0].text)return r.content[0].text;
    return JSON.stringify(r);
  }catch(e){return "Could not reach the AI service: "+e;}
}
const SCHOOL="Al Injaz International Private School, Al Ansab, Muscat. Cambridge IGCSE & GED bilingual (Arabic/English), KG-Grade 12. Affordable fees (~OMR 1,822-3,322). Therapist-led special-needs inclusion. AI Students Progress Tracker. Position: 'Affordable Cambridge education with world-class inclusion - and AI-powered learning.' Competitors: Dorat Al-Khaleej, Al-Ibdaa, MISO, British School Muscat, TAISM, Indian School Muscat. Known issues: brand fragmentation (two domains), stale app, weak local SEO, Al Ansab commute. Goals: admissions, awareness, retention. Moderate budget.";

const AGENTS=[
 {id:"director",name:"Marketing Director",role:"Orchestrates strategy & integrates the team",color:C.gold,director:true,
  headline:"We hold a position no Muscat rival owns - now execute: merge the brand, fix the funnel, and tell the inclusion + AI story until every parent knows it.",
  findings:["All four specialists converge on one message: affordable Cambridge + world-class inclusion + AI-powered learning.","Biggest single threat is Dorat Al-Khaleej - closest match, but can't match our AI + bilingual + lower-fee bundle.","Most damage is self-inflicted and fixable: brand fragmentation, stale app, weak follow-up.","Location (Al Ansab) is the structural risk - solved with a marketed, tracked bus network."],
  actions:["Approve one canonical brand, domain & handle set this week.","Sequence: brand+funnel (30d) -> app+SEO (60d) -> campaign+events (90d).","Hold each agent to its KPIs; review this app weekly.","Green-light retention levers: loyalty/sibling discounts, bus network, teacher pay benchmark."],
  deliverables:["Integrated marketing strategy & 30-60-90 roadmap","Weekly team performance review (this app)","Budget allocation across the four pillars","Decision log & approvals"],
  kpis:[{l:"Strategy integrated & approved",t:"Sign-off",v:90},{l:"Overall admissions goal",t:"+40% enquiries",v:22},{l:"Brand consolidation done",t:"1 domain live",v:30},{l:"Weekly reviews run",t:"Every week",v:60}]},
 {id:"intel",name:"Market & Competitor Intel",role:"Live competitive & demand intelligence",color:C.teal,
  headline:"Dorat Al-Khaleej is the one school that can copy our inclusion story - so win now on the affordable bilingual Cambridge + AI bundle it can't match.",
  findings:["AIIPS sits in an under-served affordable-Cambridge + bilingual band, below premium (BSM/TAISM) and above CBSE.","White space: no nearby rival pairs therapist-led inclusion WITH AI-powered learning at our price.","Biggest threat: Dorat Al-Khaleej (Cambridge + special-needs + multi-branch reach).","Local catchment skews price-sensitive and values bilingual Arabic/English.","Rivals lead on heritage/curriculum; few lead on measurable outcomes - our AI tracker is differentiated proof."],
  actions:["Build live battlecards (Dorat first, then MISO, Al-Ibdaa) with verified fees + dated URLs.","Arm content/SEO with counter-messaging on price transparency & outcomes.","Run a catchment heat-map vs Dorat's branch locations for geo-targeting.","Stand up monthly competitor-watch + quarterly parent-sentiment sweep."],
  deliverables:["Competitor battlecards (Dorat priority)","Positioning map + white-space brief","Catchment/demand heat-map","Monthly competitor digest"],
  kpis:[{l:"Competitor briefings refreshed",t:"Monthly",v:30},{l:"Verified-fee coverage",t:"100% w/ source",v:40},{l:"Parent-sentiment sweeps",t:"Quarterly",v:20},{l:"Actionable insights to team",t:">=4 / month",v:35}]},
 {id:"seo",name:"SEO, Web & Analytics",role:"Search visibility, conversion & reporting",color:C.navy,
  headline:"Google sees two half-strength schools instead of one - merge to a single domain, own our Maps reviews, and build pages for what parents actually search.",
  findings:["CONFIRMED LIVE: alinjaz.edu.om and alinjazschool.com serve byte-identical pages with no canonical/301 - Google splits ranking signals.","Name fragmentation (AIPS/AIIPS, mismatched FB handles) weakens brand & knowledge-panel trust.","Conversion friction: stale enquiry modals mixing AY 2023-24 & 2025-26; no analytics events.","Reviews/local-SEO gap: app last updated 2023 (~6 reviews); GBP under-optimised.","No pages for high-intent terms ('affordable IGCSE school Muscat', 'special needs school Oman')."],
  actions:["Pick ONE canonical domain (alinjaz.edu.om); 301-redirect the other; unify name & handles.","Claim/optimise Google Business Profile + launch a parent review drive.","Build 3 keyword->landing pages with fees, proof, schema & a tracked CTA.","Replace the 2023 form; single clean form with GA4 events + UTM'd WhatsApp.","Stand up a monthly analytics dashboard."],
  deliverables:["Keyword map + landing-page briefs","Domain-consolidation & technical-SEO checklist","Local-SEO + review-drive playbook","Monthly performance report"],
  kpis:[{l:"Google reviews",t:"100+ at >=4.3*",v:15},{l:"Qualified enquiries",t:"+40% YoY",v:20},{l:"Local pack visibility",t:"Top-3 Maps + page-1",v:25},{l:"Enquiry-form conversion",t:">=3.5% (GA4)",v:20}]},
 {id:"content",name:"Content & Social",role:"Storytelling: IG, FB, WhatsApp, app",color:C.gold,
  headline:"We have the labs, the inclusion model and the AI tracker - now show them, in Arabic and English, until our story is the one every Muscat parent knows.",
  findings:["Format mismatch: newsletters posted as Reels; IG follows only 12 accounts -> broadcast-only, near-zero community.","Proof assets hidden: STEM/VR/3D-maths labs, pool, accreditation, inclusion rarely shown.","The AI Students Progress Tracker is unique & ownable, yet unmarketed.","Bilingual demand unmet - single-language posting halves reach.","What resonates: real classrooms, real children (with consent), parent voices, affordability as value."],
  actions:["Lock a weekly calendar of 4-5 posts mapped to the 4 pillars & funnel stages.","Reel themes: Inside Our Labs, Every Child Included, Meet the AI Tracker, Bilingual Day-in-the-Life, Parent Proof.","Bilingual by default: Arabic-first + English; burn Arabic captions on Reels.","Launch a WhatsApp Channel; move newsletters there as digests.","Build a 4-part AI Tracker series ending in 'Download the app'."],
  deliverables:["Weekly content calendar (EN/AR)","Library of 5 Reel scripts","WhatsApp Channel launch kit","Bilingual caption & hashtag bank"],
  kpis:[{l:"Posts/week & engagement",t:"4-5/wk, >=3%",v:30},{l:"Follower growth",t:"+15% / quarter",v:25},{l:"WhatsApp Channel subs",t:"500 in 90 days",v:10},{l:"Tour bookings from social",t:">=20 / month",v:20}]},
 {id:"crm",name:"Admissions & CRM",role:"Enquiry funnel, nurture & retention",color:C.green,
  headline:"Answer every enquiry in minutes and give every family a reason to stay - turning Al Ansab's commute into a bus route and inclusion into 25% conversion, 92% re-enrolment.",
  findings:["Top-of-funnel leak: outdated mixed-year forms; no single CRM - leads scatter across WhatsApp/email/walk-ins.","Speed-to-lead failure: no instant acknowledgement or 24h follow-up - top cause of defection.","Commute is the #1 switching driver; without a visible bus solution even won leads churn.","Retention risk: thin reviews weaken trust; teacher-poaching breaks the continuity parents re-enrol for.","Affordability, inclusion & AI tracker absent from follow-up & re-enrolment messaging."],
  actions:["One short bilingual enquiry form wired to CRM; auto-create a deal on submit.","Speed-to-lead: instant acknowledgement + human call <24h + 5-step nurture.","Standardise CRM stages with owner + next action on every lead.","Retention levers: sibling/loyalty discounts, early-bird re-enrolment, 'keep your teacher' continuity.","Promote a GPS-tracked bus network in every tour & re-enrolment touch."],

state.kpi=state.kpi||{};state.status=state.status||{};state.sugg=state.sugg||{};
state.tasks=state.tasks||[];state.activity=state.activity||[];state.reports=state.reports||[];state.notes=state.notes||"";
function save(){localStorage.setItem(LS,JSON.stringify(state));}
function logAct(text){state.activity.push({when:new Date().toLocaleString(),text});save();}
function kpiVal(aid,i){const a=AGENTS.find(x=>x.id===aid);return (state.kpi[aid]&&state.kpi[aid][i]!=null)?state.kpi[aid][i]:a.kpis[i].v;}
function agentPerf(a){let s=0;a.kpis.forEach((k,i)=>s+=kpiVal(a.id,i));return Math.round(s/a.kpis.length);}
function teamPerf(){const sp=AGENTS.filter(a=>!a.director);let s=0;sp.forEach(a=>s+=agentPerf(a));return Math.round(s/sp.length);}
function statusOf(aid){return state.status[aid]||(aid==="director"?"on":"att");}
const SLAB={on:["On track","s-on"],att:["Needs attention","s-att"],blk:["Blocked","s-blk"]};
function colorFor(v){return v>=70?C.green:v>=45?C.gold:C.red;}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function addTask(){const t=document.getElementById("ntTitle").value.trim();const ag=document.getElementById("ntAgent").value;if(!t)return;
 state.tasks.push({id:"t"+Date.now(),title:t,agent:ag,status:"todo"});logAct(`Task created: "${t}" → ${AGENTS.find(a=>a.id===ag).name}`);save();renderTasks();}
function moveTask(id,dir){const t=state.tasks.find(x=>x.id===id);if(!t)return;const order=["todo","doing","done"];let i=order.indexOf(t.status);i+=dir==="fwd"?1:-1;i=Math.max(0,Math.min(2,i));t.status=order[i];logAct(`Task "${t.title}" moved to ${t.status}`);save();renderTasks();}
function delTask(id){const t=state.tasks.find(x=>x.id===id);state.tasks=state.tasks.filter(x=>x.id!==id);if(t)logAct(`Task removed: "${t.title}"`);save();renderTasks();}

 const prompt=`You are the Marketing Director of ${SCHOOL}\nWrite ONE specific, actionable suggestion (max 40 words) for your "${a.name}" (role: ${a.role}). Current performance ${agentPerf(a)}%, status ${SLAB[statusOf(aid)][0]}, weakest KPI "${ranked.k.l}" at ${ranked.v}% toward target "${ranked.k.t}". Anchor it in their priorities: ${a.actions.join('; ')}. Output only the suggestion text, no preamble or quotes.`;

 const sp=AGENTS.filter(a=>!a.director);
 const busy=document.getElementById('teamSugBusy');const out=document.getElementById('teamSugOut');
 if(out)out.innerHTML='';let done=0;
 for(const a of sp){
   if(busy)busy.textContent='Generating '+(done+1)+'/'+sp.length+': '+a.name+'…';
   const ranked=a.kpis.map((k,i)=>({k,v:kpiVal(a.id,i)})).sort((x,y)=>x.v-y.v)[0];
   const prompt=`You are the Marketing Director of ${SCHOOL}\nWrite ONE specific, actionable suggestion (max 40 words) for your "${a.name}" (role: ${a.role}). Current performance ${agentPerf(a)}%, status ${SLAB[statusOf(a.id)][0]}, weakest KPI "${ranked.k.l}" at ${ranked.v}% toward target "${ranked.k.t}". Anchor it in their priorities: ${a.actions.join('; ')}. Output only the suggestion text, no preamble or quotes.`;
   const sug=String(await askAI(prompt)).trim();
   state.sugg[a.id]=state.sugg[a.id]||[];state.sugg[a.id].push({txt:sug,when:new Date().toLocaleString()});
   logAct(`AI suggestion drafted & posted to ${a.name}`);save();done++;
   if(out)out.innerHTML+=`<div class="sugg"><div class="when" style="color:${a.color};font-weight:600">${a.name}</div>${esc(sug)}</div>`;
 }
 if(busy)busy.textContent=`Done — ${sp.length} suggestions posted to each agent (see their Status & suggestions tab).`;
}

function faq(topic,freeText){var F=FAQ[lang];if(topic&&F[topic])return F[topic];var x=(freeText||'').toLowerCase();

 if(/special|need|inclus|autism|احتياج|دمج|توحد/.test(x))return F.sen;
 if(/bus|transport|نقل|حافل/.test(x))return F.transport;
 return F.default;}

 }else{ans=faq(topic,freeText);}
